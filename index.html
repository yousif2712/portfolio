<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yousif Nazeer - Portfolio</title>

    <!-- Basic Styling -->
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .hero-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1100px;
            width: 100%;
            gap: 40px;
        }

        .hero-text h1 {
            font-size: 48px;
            margin: 0;
        }

        .hero-text h2 {
            font-size: 20px;
            font-weight: normal;
            color: #94a3b8;
            margin: 10px 0;
        }

        .hero-text p {
            color: #cbd5e1;
            line-height: 1.6;
        }

        .hero-buttons {
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            text-decoration: none;
            margin-right: 10px;
            border-radius: 6px;
        }

        .primary-btn {
            background: #38bdf8;
            color: black;
        }

        .secondary-btn {
            border: 1px solid #38bdf8;
            color: #38bdf8;
        }

        .hero-image img {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #38bdf8;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-content {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>

<section id="hero" class="hero">
    <div class="hero-content">

        <div class="hero-text">
            <h1>Yousif Nazeer</h1>

            <h2>
                Aspiring AI Engineer |
                Mathematics Graduate |
                Intelligent Systems Builder
            </h2>

            <p>
                Building Smart Systems Through AI, Mathematics &
                Innovation. Passionate about Machine Learning,
                Predictive Modeling, RNN, ARIMA, and Real-World
                Problem Solving.
            </p>

            <div class="hero-buttons">
                <a href="#projects" class="btn primary-btn">View Projects</a>
                <a href="resume.pdf" class="btn secondary-btn" download>
                    Download CV
                </a>
            </div>
        </div>

        <div class="hero-image">
            <img src="profile.jpg" alt="Yousif Nazeer">
        </div>

    </div>
</section>

</body>
</html>
